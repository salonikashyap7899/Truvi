# Truvi — Nginx reverse proxy for the single-origin Hostinger VPS deploy.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/truvi
#   sudo ln -s /etc/nginx/sites-available/truvi /etc/nginx/sites-enabled/truvi
#   sudo rm -f /etc/nginx/sites-enabled/default
#   # edit server_name below to your domain, then:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d your-domain.com -d www.your-domain.com   # adds TLS
#
# The Node process (PM2) listens on 127.0.0.1:5000 and serves the API, the
# built React app, and uploaded files. Nginx just terminates TLS and proxies
# everything through — including the Socket.io WebSocket upgrade.

# Required for WebSocket (Socket.io) proxying. Must live in the http context;
# this file is included from nginx.conf's http block, so defining it here is fine.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Presentation/CAD/video uploads go up to 50 MB (see multer limits).
    client_max_body_size 50M;

    # Gzip text assets (the JS/CSS bundles benefit most).
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket / Socket.io upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Pass real client info so `trust proxy` + secure cookies work.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
    }
}
